upstream backend {
    server backend1:5000;
    server backend2:5000;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /create {
        proxy_pass http://backend;
    }

    location /guess {
        proxy_pass http://backend;
    }

    location /health {
        proxy_pass http://backend;
    }

    location / {
        try_files $uri /index.html;
    }
}